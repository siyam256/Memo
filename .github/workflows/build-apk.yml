name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions dashboard

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "Warning: debug.keystore.base64 not found."
          fi

      - name: Create Env File for Secrets Plugin
        run: cp .env.example .env

      - name: Optimize Gradle Properties for CI
        run: |
          # Append properties to override local config with robust CI alternatives
          echo "" >> gradle.properties
          echo "kotlin.compiler.execution.strategy=in-process" >> gradle.properties
          echo "org.gradle.configuration-cache=false" >> gradle.properties
          echo "org.gradle.caching=false" >> gradle.properties

      - name: Build with Gradle
        run: gradle assembleDebug --no-configuration-cache

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: receipt-generator-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
