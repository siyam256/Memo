name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions dashboard

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "Warning: debug.keystore.base64 not found."
          fi

      - name: Create Env File for Secrets Plugin
        run: cp .env.example .env

      - name: Optimize Gradle Properties for CI
        run: |
          # Set safe memory limits and reduce workers/parallelism for the 2-core CI runner (prevents OOM daemon fallback)
          sed -i 's/org.gradle.jvmargs=-Xmx4g/org.gradle.jvmargs=-Xmx2048m/g' gradle.properties
          sed -i 's/org.gradle.workers.max=4/org.gradle.workers.max=2/g' gradle.properties
          sed -i 's/org.gradle.parallel=true/org.gradle.parallel=false/g' gradle.properties
          
          # Force daemon usage for both Gradle and Kotlin compilation (avoids in-process KSP NPE)
          echo "org.gradle.daemon=true" >> gradle.properties
          echo "kotlin.compiler.execution.strategy=daemon" >> gradle.properties
          echo "kotlin.daemon.jvmopts=-Xmx1536m" >> gradle.properties
          
          # Disable caching and configuration-cache for CI safety
          echo "org.gradle.configuration-cache=false" >> gradle.properties
          echo "org.gradle.caching=false" >> gradle.properties

      - name: Build with Gradle
        run: gradle assembleDebug --daemon --no-parallel --max-workers=2 --no-configuration-cache

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: receipt-generator-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
