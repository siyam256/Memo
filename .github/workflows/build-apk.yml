name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions dashboard

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Make Gradlew Executable and Fix Line Endings
        run: |
          tr -d '\r' < gradlew > gradlew.tmp
          mv gradlew.tmp gradlew
          chmod +x gradlew

      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            tr -d '[:space:]' < debug.keystore.base64 | base64 -d > debug.keystore
          else
            echo "Warning: debug.keystore.base64 not found."
          fi

      - name: Create Env File for Secrets Plugin
        run: cp .env.example .env

      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon --max-workers=2

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: receipt-generator-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
